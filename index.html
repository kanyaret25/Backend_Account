<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef}=React;

// ── CONSTANTS ──────────────────────────────────────────────
const CREDIT_TYPES=[
{value:“bad_debt”,    label:“เครดิตเสีย”,             color:”#ef4444”},
{value:“loan”,        label:“เครดิตเงินกู้”,           color:”#f97316”},
{value:“scan_outside”,label:“สแกนของนอกร้าน”,         color:”#8b5cf6”},
{value:“in_store”,   label:“ซื้อของร้าน (เครดิต)”,    color:”#3b82f6”},
];
const MONTHS=[“ม.ค.”,“ก.พ.”,“มี.ค.”,“เม.ย.”,“พ.ค.”,“มิ.ย.”,“ก.ค.”,“ส.ค.”,“ก.ย.”,“ต.ค.”,“พ.ย.”,“ธ.ค.”];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function thDate(iso){if(!iso)return”-”;const[y,m,d]=iso.split(”-”);return`${+d} ${MONTHS[+m-1]} ${+y+543}`}
function monthKey(iso){return iso?iso.slice(0,7):””}
function monthLabel(k){if(!k)return””;const[y,m]=k.split(”-”);return`${MONTHS[+m-1]} ${+y+543}`}
function today(){return new Date().toISOString().slice(0,10)}
function fmt(n){return Math.round(n).toLocaleString(“th-TH”)}

// ── STORAGE ─────────────────────────────────────────────────
function save(k,v){try{localStorage.setItem(“cb_”+k,JSON.stringify(v))}catch(*){}}
function load(k,fb){try{const r=localStorage.getItem(“cb*”+k);return r?JSON.parse(r):fb}catch(_){return fb}}

// ── CALC ────────────────────────────────────────────────────
// debt fields: principalMom, principalUs, creditPrice, totalInstallments
// profit split = (creditPrice - principalMom - principalUs) split by ratio momProfitRatio
function calcSplit(debt){
const totalPrincipal=(debt.principalMom||0)+(debt.principalUs||0);
const totalProfit=debt.creditPrice-totalPrincipal;
const profitMom=totalProfit*(debt.momProfitRatio||0.5);
const profitUs=totalProfit*(1-(debt.momProfitRatio||0.5));
return{totalPrincipal,totalProfit,profitMom,profitUs,
momRatio:(debt.principalMom||0)/debt.creditPrice,
usRatio:(debt.principalUs||0)/debt.creditPrice,
momProfitRatio:profitMom/debt.creditPrice,
usProfitRatio:profitUs/debt.creditPrice};
}

// ── SMALL UI ────────────────────────────────────────────────
const iStyle={width:“100%”,padding:“8px 10px”,border:“1.5px solid #e2e8f0”,
borderRadius:8,fontSize:14,outline:“none”,background:”#fff”};

function Tag({type}){
const t=CREDIT_TYPES.find(x=>x.value===type)||{label:type,color:”#888”};
return<span style={{background:t.color+“22”,color:t.color,border:`1px solid ${t.color}44`,
borderRadius:6,padding:“2px 8px”,fontSize:11,fontWeight:700,whiteSpace:“nowrap”}}>{t.label}</span>;
}

maxHeight:“92vh”,overflowY:“auto”,boxShadow:“0 12px 48px #0005”}}

padding:“16px 20px 12px”,borderBottom:“1px solid #f0f4f8”,position:“sticky”,top:0,background:”#fff”,zIndex:1}}>
<span style={{fontWeight:800,fontSize:15,color:”#1a1a2e”}}>{title}</span>
<button onClick={onClose} style={{background:”#f1f5f9”,border:“none”,width:28,height:28,
borderRadius:8,fontSize:16,cursor:“pointer”,color:”#64748b”}}>✕</button>
</div>
<div style={{padding:“14px 20px 20px”}}>{children}</div>
</div>
</div>
);
}

function Row({label,children,required}){
return(
<div style={{marginBottom:11}}>
<label style={{display:“block”,fontSize:12,color:”#64748b”,marginBottom:3,fontWeight:600}}>
{label}{required&&<span style={{color:”#ef4444”}}> *</span>}
</label>

</div>
);
}

function Btn({onClick,color=”#1a1a2e”,children,small,full,outline}){

<button onClick={onClick} style={{

color:outline?color:”#fff”,
border:outline?`2px solid ${color}`:“none”,
borderRadius:9,padding:small?“5px 10px”:“10px 16px”,
fontSize:small?12:14,fontWeight:700,cursor:“pointer”,
width:full?“100%”:“auto”,whiteSpace:“nowrap”}}>
{children}
</button>
);
}

function MCard({label,value,sub,color=”#3b82f6”}){
return(
<div style={{background:color+“0f”,borderRadius:10,padding:“10px 12px”,border:`1px solid ${color}25`}}>
<div style={{fontSize:10,color:”#94a3b8”,marginBottom:2}}>{label}</div>
<div style={{fontSize:16,fontWeight:800,color}}>{value}</div>
{sub&&<div style={{fontSize:10,color:”#94a3b8”,marginTop:1}}>{sub}</div>}
</div>
);
}

function BigCard({label,value,sub,color}){
return(
<div style={{background:”#fff”,borderRadius:12,padding:“14px 16px”,boxShadow:“0 1px 6px #0001”}}>
<div style={{fontSize:11,color:”#94a3b8”,marginBottom:3}}>{label}</div>
<div style={{fontSize:22,fontWeight:900,color}}>{value}</div>
{sub&&<div style={{fontSize:11,color:”#94a3b8”,marginTop:2}}>{sub}</div>}
</div>
);
}

function ProgressBar({pct,color=“linear-gradient(90deg,#3b82f6,#06b6d4)”}){
return(
<div style={{background:”#e2e8f0”,borderRadius:6,height:7,overflow:“hidden”}}>
<div style={{background:color,width:`${Math.min(100,pct)}%`,height:“100%”,borderRadius:6,
transition:“width .4s”}}/>

// ── MAIN APP ────────────────────────────────────────────────
function App(){
const [tab,setTab]=useState(“dashboard”);
const [customers,setCustomers]=useState(()=>load(“customers”,[]));
const [debts,setDebts]=useState(()=>load(“debts”,[]));
const [payments,setPayments]=useState(()=>load(“payments”,[]));

// modals
const [modal,setModal]=useState(null); // {type, data}
const closeModal=()=>setModal(null);

// search
const [search,setSearch]=useState(””);

// notification seen
const [notiSeen,setNotiSeen]=useState(false);

// auto-save
useEffect(()=>{save(“customers”,customers)},[customers]);
useEffect(()=>{save(“debts”,debts)},[debts]);
useEffect(()=>{save(“payments”,payments)},[payments]);

// ── derived maps ──
const custMap=useMemo(()=>Object.fromEntries(customers.map(c=>[c.id,c])),[customers]);
const debtMap=useMemo(()=>Object.fromEntries(debts.map(d=>[d.id,d])),[debts]);

// ── debt stats ──
const stats=useMemo(()=>{
const s={};
debts.forEach(d=>{
const sp=calcSplit(d);
const ps=payments.filter(p=>p.debtId===d.id);
const totalPaid=ps.reduce((a,p)=>a+p.amount,0);
const remaining=Math.max(0,d.creditPrice-totalPaid);
// allocate payments proportionally
const momCapReturned=totalPaid*sp.momRatio;
const usCapReturned=totalPaid*sp.usRatio;
const momProfitEarned=totalPaid*sp.momProfitRatio;
const usProfitEarned=totalPaid*sp.usProfitRatio;
s[d.id]={…sp,totalPaid,remaining,momCapReturned,usCapReturned,momProfitEarned,usProfitEarned,
installAmt:d.creditPrice/d.totalInstallments,payments:ps};
});
return s;
},[debts,payments]);

// ── today’s due ──
const todayDue=useMemo(()=>{
const todayStr=today();
return debts.filter(d=>{
if(!d.startDate)return false;
const s=stats[d.id];
if(s.remaining<=0)return false;
// check if any installment falls today
const start=new Date(d.startDate);
const dayOfMonth=start.getDate();
const t=new Date(todayStr);
return t.getDate()===dayOfMonth;
});
},[debts,stats]);

// ── monthly summary ──
const monthly=useMemo(()=>{
const map={};
payments.forEach(p=>{
const d=debtMap[p.debtId];if(!d)return;
const sp=calcSplit(d);
const mk=monthKey(p.date);
if(!map[mk])map[mk]={income:0,momCap:0,usCap:0,momProfit:0,usProfit:0,count:0};
map[mk].income+=p.amount;
map[mk].momCap+=p.amount*sp.momRatio;
map[mk].usCap+=p.amount*sp.usRatio;
map[mk].momProfit+=p.amount*sp.momProfitRatio;
map[mk].usProfit+=p.amount*sp.usProfitRatio;
map[mk].count++;
});
return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>({key:k,label:monthLabel(k),…v}));
},[payments,debtMap]);

// ── totals ──
const totals=useMemo(()=>{
let momCap=0,usCap=0,momProfit=0,usProfit=0,outstanding=0,totalOut=0;
debts.forEach(d=>{
momCap+=d.principalMom||0;
usCap+=d.principalUs||0;
totalOut+=d.creditPrice;
outstanding+=stats[d.id]?.remaining||0;
});
Object.values(stats).forEach(s=>{
momProfit+=s.momProfitEarned;
usProfit+=s.usProfitEarned;
});
return{momCap,usCap,momProfit,usProfit,outstanding,totalOut,
totalCap:momCap+usCap,totalCapReturned:Object.values(stats).reduce((a,s)=>a+s.momCapReturned+s.usCapReturned,0)};
},[debts,stats]);

// ── safe lending analysis ──
const analysis=useMemo(()=>{
const avgMonthlyIncome=monthly.length>0?monthly.reduce((a,m)=>a+m.income,0)/monthly.length:0;
const usCapNet=totals.usCap-Object.values(stats).reduce((a,s)=>a+s.usCapReturned,0);
const safeNewLend=Math.max(0,avgMonthlyIncome*0.7-usCapNet*0.1);
return{avgMonthlyIncome,usCapNet,safeNewLend};
},[monthly,totals,stats]);

// ── by credit type summary ──
const byType=useMemo(()=>{
const m={};
CREDIT_TYPES.forEach(ct=>{m[ct.value]={count:0,totalCredit:0,outstanding:0,momCap:0,usCap:0,momProfit:0,usProfit:0}});
debts.forEach(d=>{
const t=m[d.creditType];if(!t)return;
const s=stats[d.id];
t.count++;t.totalCredit+=d.creditPrice;t.outstanding+=s.remaining;
t.momCap+=d.principalMom||0;t.usCap+=d.principalUs||0;
t.momProfit+=s.momProfitEarned;t.usProfit+=s.usProfitEarned;
});
return m;
},[debts,stats]);

// ── filtered customers ──
const filteredCustomers=useMemo(()=>{
const q=search.toLowerCase();
return customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone?.includes(q));
},[customers,search]);

const filteredDebts=useMemo(()=>{
const q=search.toLowerCase();
return debts.filter(d=>{
const c=custMap[d.customerId];
return(c?.name||””).toLowerCase().includes(q)||(d.note||””).toLowerCase().includes(q);
});
},[debts,search,custMap]);

// ── handlers ──
function addCustomer(form){
setCustomers(p=>[…p,{id:genId(),…form}]);
closeModal();
}

function addDebt(form){
setDebts(p=>[…p,{id:genId(),…form,
principalMom:+form.principalMom,principalUs:+form.principalUs,
creditPrice:+form.creditPrice,totalInstallments:+form.totalInstallments,
momProfitRatio:+form.momProfitRatio}]);
closeModal();
}

function updateDebt(id,form){
setDebts(p=>p.map(d=>d.id===id?{…d,…form,
principalMom:+form.principalMom,principalUs:+form.principalUs,
creditPrice:+form.creditPrice,totalInstallments:+form.totalInstallments,
momProfitRatio:+form.momProfitRatio}:d));
closeModal();
}

function addPayment(form){
setPayments(p=>[…p,{id:genId(),…form,amount:+form.amount}]);
closeModal();
}

function updatePayment(id,form){
setPayments(p=>p.map(x=>x.id===id?{…x,…form,amount:+form.amount}:x));
closeModal();
}

function deletePayment(id){
setPayments(p=>p.filter(x=>x.id!==id));
}

function deleteCustomer(id){
const dids=debts.filter(d=>d.customerId===id).map(d=>d.id);
setPayments(p=>p.filter(x=>!dids.includes(x.debtId)));
setDebts(p=>p.filter(d=>d.customerId!==id));
setCustomers(p=>p.filter(c=>c.id!==id));
closeModal();
}

function deleteDebt(id){
setPayments(p=>p.filter(x=>x.debtId!==id));
setDebts(p=>p.filter(d=>d.id!==id));
closeModal();
}

function exportData(){
const blob=new Blob([JSON.stringify({customers,debts,payments,v:2},null,2)],{type:“application/json”});
const a=document.createElement(“a”);a.href=URL.createObjectURL(blob);
a.download=`บัญชีเครดิต_${today()}.json`;a.click();
}

function importData(e){
const f=e.target.files[0];if(!f)return;
const r=new FileReader();
r.onload=ev=>{
try{
const d=JSON.parse(ev.target.result);
if(d.customers)setCustomers(d.customers);
if(d.debts)setDebts(d.debts);
if(d.payments)setPayments(d.payments);
alert(“นำเข้าสำเร็จ ✅”);
}catch{alert(“ไฟล์ไม่ถูกต้อง”);}
};r.readAsText(f);e.target.value=””;
}

return(
<div style={{minHeight:“100vh”,paddingBottom:20}}>
{/* ── HEADER ── */}
<div style={{background:“linear-gradient(135deg,#0f172a,#1e293b)”,color:”#fff”,padding:“16px 16px 0”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,marginBottom:12}}>
<div>
<div style={{fontSize:18,fontWeight:900,letterSpacing:.3}}>💰 ระบบบัญชีเครดิต</div>

<button onClick={exportData} style={{background:”#ffffff18”,color:”#fff”,

justifyContent:“center”,fontWeight:700}}>{todayDue.length}</span>
)}
</button>

</div>

// ── ADD/EDIT CUSTOMER ────────────────────────────────────────
function AddCustomerModal({data,onSave,onClose}){
const [f,setF]=useState({name:data?.name||””,phone:data?.phone||””});
function save(){if(!f.name.trim()){alert(“กรุณากรอกชื่อ”);return;}onSave(f);}
return(
<Modal title={data?“แก้ไขลูกค้า”:“เพิ่มลูกค้าใหม่”} onClose={onClose}>
<Row label="ชื่อลูกค้า" required><input style={iStyle} value={f.name} placeholder=“สมชาย ใจดี” onChange={e=>setF(x=>({…x,name:e.target.value}))}/></Row>
<Row label="เบอร์โทร"><input style={iStyle} value={f.phone} placeholder=“08x-xxx-xxxx” onChange={e=>setF(x=>({…x,phone:e.target.value}))}/></Row>
<Btn full onClick={save}>{data?“บันทึกการแก้ไข”:“เพิ่มลูกค้า”}</Btn>
</Modal>
);
}

// ── ADD/EDIT DEBT ─────────────────────────────────────────────
function DebtModal({data,customers,onSave,onClose}){
const [f,setF]=useState({
customerId:data?.customerId||””,
creditType:data?.creditType||“bad_debt”,
principalMom:data?.principalMom||””,
principalUs:data?.principalUs||””,
momProfitRatio:data?.momProfitRatio??0.5,
creditPrice:data?.creditPrice||””,
totalInstallments:data?.totalInstallments||””,
startDate:data?.startDate||today(),
note:data?.note||””
});

const totalPrincipal=(+f.principalMom||0)+(+f.principalUs||0);
const totalProfit=(+f.creditPrice||0)-totalPrincipal;
const momProfit=totalProfit*(+f.momProfitRatio||0);
const usProfit=totalProfit*(1-(+f.momProfitRatio||0));

function save(){
const miss=[];
if(!f.customerId)miss.push(“ลูกค้า”);
if(!(+f.creditPrice>0))miss.push(“ยอดเครดิตรวม”);
if(!(+f.totalInstallments>0))miss.push(“จำนวนงวด”);
if(miss.length){alert(“กรุณากรอก: “+miss.join(”, “));return;}
onSave({…f,momProfitRatio:+f.momProfitRatio});
}

return(
<Modal title={data?“แก้ไขบัญชีเครดิต”:“เพิ่มบัญชีเครดิต”} onClose={onClose} wide>
<Row label="ลูกค้า" required>
<select style={iStyle} value={f.customerId} onChange={e=>setF(x=>({…x,customerId:e.target.value}))}>
<option value="">– เลือกลูกค้า –</option>
{customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
</select>
</Row>
<Row label="ประเภทเครดิต" required>
<select style={iStyle} value={f.creditType} onChange={e=>setF(x=>({…x,creditType:e.target.value}))}>
{CREDIT_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
</select>
</Row>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:8}}>
<Row label="ทุนแม่ (฿)"><input type=“number” style={iStyle} value={f.principalMom} placeholder=“0” onChange={e=>setF(x=>({…x,principalMom:e.target.value}))}/></Row>
<Row label="ทุนเรา (฿)"><input type=“number” style={iStyle} value={f.principalUs}  placeholder=“0” onChange={e=>setF(x=>({…x,principalUs:e.target.value}))}/></Row>
</div>
<Row label="ยอดเครดิตรวม (ที่ลูกค้าต้องจ่ายทั้งหมด)" required>
<input type=“number” style={iStyle} value={f.creditPrice} placeholder=“เช่น 6500” onChange={e=>setF(x=>({…x,creditPrice:e.target.value}))}/>
</Row>
<Row label={`สัดส่วนกำไรแม่ (${Math.round((+f.momProfitRatio||0)*100)}%) : กำไรเรา (${Math.round((1-(+f.momProfitRatio||0))*100)}%)`}>
<input type=“range” min=“0” max=“1” step=“0.05” value={f.momProfitRatio}
onChange={e=>setF(x=>({…x,momProfitRatio:e.target.value}))}
style={{width:“100%”,accentColor:”#8b5cf6”}}/>
</Row>
{+f.creditPrice>0&&totalPrincipal>0&&(
<div style={{background:”#f8fafc”,borderRadius:10,padding:10,marginBottom:10,fontSize:12}}>
<div style={{display:“grid”,gridTemplateColumns:“repeat(4,1fr)”,gap:5}}>
<MCard label=“กำไรรวม” value={`฿${fmt(totalProfit)}`} color=”#f59e0b”/>
<MCard label=“กำไรแม่” value={`฿${fmt(momProfit)}`}   color=”#8b5cf6”/>
<MCard label=“กำไรเรา” value={`฿${fmt(usProfit)}`}    color=”#10b981”/>
<MCard label=“รวมทุน”  value={`฿${fmt(totalPrincipal)}`} color=”#64748b”/>
</div>
</div>
)}
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:8}}>
<Row label="จำนวนงวด" required><input type=“number” style={iStyle} value={f.totalInstallments} placeholder=“เช่น 10” onChange={e=>setF(x=>({…x,totalInstallments:e.target.value}))}/></Row>
<Row label="วันเริ่มต้น"><input type=“date” style={iStyle} value={f.startDate} onChange={e=>setF(x=>({…x,startDate:e.target.value}))}/></Row>
</div>
<Row label="หมายเหตุ"><input style={iStyle} value={f.note} placeholder=”(ไม่บังคับ)” onChange={e=>setF(x=>({…x,note:e.target.value}))}/></Row>
<Btn full onClick={save}>{data?“บันทึกการแก้ไข”:“บันทึกบัญชี”}</Btn>
</Modal>
);
}

// ── ADD/EDIT PAYMENT ──────────────────────────────────────────
function PaymentModal({data,debt,stats,calcSplit,onSave,onClose}){
const [f,setF]=useState({
debtId:debt.id,
date:data?.date||today(),
amount:data?.amount||””,
note:data?.note||””
});
const sp=calcSplit(debt);
const amt=+f.amount||0;

function save(){
if(!f.date||!(+f.amount>0)){alert(“กรุณากรอกวันที่และจำนวนเงิน”);return;}
onSave(f);
}

return(
<Modal title={data?“แก้ไขการชำระ”:“บันทึกรับเงิน”} onClose={onClose}>
<div style={{background:”#f8fafc”,borderRadius:10,padding:10,marginBottom:12,fontSize:13}}>
<div style={{fontWeight:800}}>{debt.note||“บัญชีเครดิต”}</div>
<div style={{color:”#64748b”,marginTop:2}}>
ค้างชำระ ฿{fmt(stats.remaining)} | งวดปกติ ฿{fmt(stats.installAmt)}
</div>
</div>
<Row label="วันที่รับเงิน" required><input type=“date” style={iStyle} value={f.date} onChange={e=>setF(x=>({…x,date:e.target.value}))}/></Row>
<Row label="จำนวนเงินที่รับ" required><input type=“number” style={iStyle} value={f.amount} placeholder=“เช่น 650” onChange={e=>setF(x=>({…x,amount:e.target.value}))}/></Row>
{amt>0&&(
<div style={{background:”#eff6ff”,border:“1px solid #bfdbfe”,borderRadius:9,padding:10,marginBottom:10}}>
<div style={{fontSize:11,color:”#64748b”,marginBottom:6}}>การแยกยอด ฿{fmt(amt)}</div>
<div style={{display:“grid”,gridTemplateColumns:“repeat(4,1fr)”,gap:5}}>
<MCard label=“ทุนแม่คืน” value={`฿${fmt(amt*sp.momRatio)}`}        color=”#8b5cf6”/>
<MCard label=“ทุนเราคืน” value={`฿${fmt(amt*sp.usRatio)}`}         color=”#3b82f6”/>
<MCard label=“กำไรแม่”   value={`฿${fmt(amt*sp.momProfitRatio)}`}   color=”#a855f7”/>
<MCard label=“กำไรเรา”   value={`฿${fmt(amt*sp.usProfitRatio)}`}    color=”#10b981”/>
</div>
</div>
)}
<Row label="หมายเหตุ"><input style={iStyle} value={f.note} placeholder=“เช่น โอนเศษ, จ่ายสด” onChange={e=>setF(x=>({…x,note:e.target.value}))}/></Row>
<Btn full color="#10b981" onClick={save}>{data?“บันทึกการแก้ไข”:“บันทึกรับเงิน”}</Btn>
</Modal>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
